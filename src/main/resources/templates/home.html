<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edy's Dev Corner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar site-navbar px-3">
  <a class="navbar-brand" th:href="@{/}">Edy's Dev Corner</a>
  <div class="d-flex align-items-center gap-2">
    <a th:href="@{/posts/new}" class="btn btn-accent btn-sm" sec:authorize="hasRole('ROLE_ADMIN')">+ New Post</a>
    <a th:href="@{/login}" class="nav-link" sec:authorize="!isAuthenticated()">Login</a>
    <!-- <a th:href="@{/register}" sec:authorize="!isAuthenticated()">Register</a> — registration disabled -->
    <form th:action="@{/logout}" method="POST" sec:authorize="isAuthenticated()" class="m-0">
      <button type="submit" class="btn btn-outline-secondary btn-sm" style="color:#cbd5e1;border-color:#334155;">Logout</button>
    </form>
  </div>
</nav>

<header class="site-hero">
  <h1>Edy's Dev Corner</h1>
  <p>If you never do more than you can, you'll never be more than you are</p>
</header>

<main class="container py-5">
  <div th:if="${message}" class="alert alert-info" th:text="${message}"></div>
  <div class="row g-4">
    <div class="col-md-6 col-lg-4" th:each="post : ${posts}">
      <div class="post-card">
        <p class="post-meta mb-1" th:text="'By ' + ${post.account.firstName} + ' · ' + ${post.createdAt}"></p>
        <h2 class="post-title">
          <a th:href="@{'/posts/' + ${post.id}}" th:text="${post.title}">Title</a>
        </h2>
        <p class="post-excerpt" th:text="${post.body}"></p>
        <a th:href="@{'/posts/' + ${post.id}}" class="btn btn-primary btn-sm mt-2">Read more</a>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <p class="m-0">&copy; 2025 Edy's Dev Corner. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
