<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edy's Dev Corner</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<header>
    <h1>Edy's Dev Corner</h1>
    <p>If you never do more than you can, you'll never be more than you are</p>
</header>
<nav class="navbar">
    <a th:href="@{/posts/new}" sec:authorize="hasRole('ROLE_ADMIN')">New Post</a>
    <a th:href="@{/login}" sec:authorize="!isAuthenticated()">Login</a>
    <a th:href="@{/register}" sec:authorize="!isAuthenticated()">Register</a>
    <form th:action="@{/logout}" method="POST" sec:authorize="isAuthenticated()" style="display: inline;">
        <button type="submit" style="background: none; border: none; color: white; cursor: pointer;">Logout</button>
    </form>
</nav>
<div class="container">
    <div th:if="${message}" th:text="${message}" class="alert"></div>
    <div class="posts-container">
        <div class="post-card" th:each="post : ${posts}">
            <h2 class="post-title">
                <a th:href="@{'/posts/' + ${post.id}}" th:text="${post.title}">Title</a>
            </h2>
            <p class="post-meta" th:text="'Written by ' + ${post.account.firstName}">Account First Name</p>
            <p class="post-meta" th:text="'Published on ' + ${post.createdAt}">Created At</p>
            <p class="post-meta" th:text="'Last updated on ' + ${post.updatedAt}">Updated At</p>
            <p class="post-content" th:text="${post.body}">body text</p>
        </div>
    </div>
</div>
<footer>
    <p>&copy; 2023 Edy's Dev Corner. All rights reserved.</p>
</footer>
</body>
</html>
