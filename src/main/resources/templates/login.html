<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login · Edy's Dev Corner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar site-navbar px-3">
  <a class="navbar-brand" th:href="@{/}">Edy's Dev Corner</a>
</nav>

<main class="container">
  <div class="form-card">
    <h2>Sign In</h2>
    <div th:if="${param.error}" class="alert alert-danger py-2">Invalid email or password.</div>
    <div th:if="${param.logout}" class="alert alert-success py-2">You have been logged out.</div>
    <form th:action="@{/login}" method="POST">
      <div class="mb-3">
        <label for="email" class="form-label fw-semibold">Email</label>
        <input id="email" type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus>
      </div>
      <div class="mb-4">
        <label for="password" class="form-label fw-semibold">Password</label>
        <input id="password" type="password" name="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    <p class="text-center text-muted small mt-3">
      <a th:href="@{/}" class="text-decoration-none">← Back to blog</a>
    </p>
  </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
