<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Media Manager · Edy's Dev Corner</title>
  <meta name="_csrf" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar site-navbar px-3">
  <a class="navbar-brand" th:href="@{/}">Edy's Dev Corner</a>
  <div class="d-flex align-items-center gap-2">
    <a th:href="@{/posts/new}" class="btn btn-accent btn-sm">+ New Post</a>
    <form th:action="@{/logout}" method="POST" class="m-0">
      <button type="submit" class="btn btn-outline-secondary btn-sm" style="color:#cbd5e1;border-color:#334155;">Logout</button>
    </form>
  </div>
</nav>

<main class="container py-5">
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div>
      <h2 class="mb-0 fw-bold">Media Manager</h2>
      <p class="text-muted small mb-0" id="fileCount"></p>
    </div>
    <!-- Upload drop-zone button -->
    <label for="uploadInput" class="btn btn-primary" style="cursor:pointer;">
      ⬆ Upload File
      <input type="file" id="uploadInput" accept="image/*,video/*" multiple style="display:none">
    </label>
  </div>

  <!-- Drop zone overlay message -->
  <div id="dropOverlay" class="drop-overlay" style="display:none">
    <div class="drop-overlay-inner">Drop files to upload</div>
  </div>

  <!-- Toast -->
  <div id="uploadToast" class="upload-toast" style="display:none"></div>

  <!-- Media grid -->
  <div id="mediaGrid" class="media-grid">
    <!-- populated by JS -->
  </div>

  <!-- Empty state -->
  <div id="emptyState" class="text-center py-5 text-muted" style="display:none">
    <div style="font-size:3rem">🖼️</div>
    <p class="mt-2">No uploads yet. Use the button above or drag files onto this page.</p>
  </div>

  <!-- Delete confirm modal -->
  <div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-0">
          <h5 class="modal-title fw-bold">Delete file?</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="deletePreviewWrap" class="text-center mb-3"></div>
          <p class="text-muted small text-center mb-0" id="deleteFilename"></p>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger btn-sm" id="confirmDeleteBtn">Delete</button>
        </div>
      </div>
    </div>
  </div>

</main>

<footer class="site-footer">
  <p class="m-0">&copy; 2025 Edy's Dev Corner. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const csrfToken  = document.querySelector('meta[name="_csrf"]').content;
  const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

  let allFiles = [];
  const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
  let pendingDelete = null;

  // ── Fetch & render file list ──────────────────────────────────────────────
  async function loadFiles() {
    const res = await fetch('/api/media');
    allFiles = await res.json();
    renderGrid(allFiles);
    document.getElementById('fileCount').textContent =
      allFiles.length === 0 ? '' : `${allFiles.length} file${allFiles.length !== 1 ? 's' : ''}`;
  }

  function renderGrid(files) {
    const grid  = document.getElementById('mediaGrid');
    const empty = document.getElementById('emptyState');
    grid.innerHTML = '';
    if (files.length === 0) { empty.style.display = 'block'; grid.style.display = 'none'; return; }
    empty.style.display = 'none'; grid.style.display = 'grid';

    files.forEach(f => {
      const card = document.createElement('div');
      card.className = 'media-card';
      card.dataset.filename = f.filename;

      const preview = f.video
        ? `<video src="${encodeURI(f.url)}" class="media-thumb" muted preload="metadata"></video>`
        : `<img src="${encodeURI(f.url)}" alt="${escapeHtml(f.filename)}" class="media-thumb" loading="lazy">`;

      const badge = f.video
        ? '<span class="media-badge media-badge-video">VIDEO</span>'
        : '<span class="media-badge media-badge-image">IMG</span>';

      card.innerHTML = `
        <a href="${encodeURI(f.url)}" target="_blank" rel="noopener" class="media-thumb-wrap">
          ${preview}
          ${badge}
        </a>
        <div class="media-card-footer">
          <span class="media-filename" title="${escapeHtml(f.filename)}">${escapeHtml(f.filename)}</span>
          <div class="media-actions">
            <button class="btn-icon copy-btn" title="Copy URL" data-url="${encodeURI(f.url)}">
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
            <button class="btn-icon delete-btn" title="Delete" data-filename="${escapeHtml(f.filename)}" data-url="${encodeURI(f.url)}" data-video="${f.video}">
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>
        </div>`;
      grid.appendChild(card);
    });

    // Wire up copy buttons
    grid.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        navigator.clipboard.writeText(window.location.origin + btn.dataset.url);
        showToast('URL copied to clipboard!', false);
      });
    });

    // Wire up delete buttons
    grid.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', () => openDeleteModal(btn.dataset.filename, btn.dataset.url, btn.dataset.video === 'true'));
    });
  }

  // ── Delete ────────────────────────────────────────────────────────────────
  function openDeleteModal(filename, url, isVideo) {
    pendingDelete = filename;
    document.getElementById('deleteFilename').textContent = filename;
    const wrap = document.getElementById('deletePreviewWrap');
    wrap.innerHTML = isVideo
      ? `<video src="${encodeURI(url)}" class="delete-preview" muted preload="metadata"></video>`
      : `<img src="${encodeURI(url)}" alt="" class="delete-preview">`;
    deleteModal.show();
  }

  document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
    if (!pendingDelete) return;
    const filename = pendingDelete;
    deleteModal.hide();
    try {
      const res = await fetch('/api/media/' + encodeURIComponent(filename), {
        method: 'DELETE',
        headers: { [csrfHeader]: csrfToken }
      });
      if (!res.ok) { const d = await res.json(); showToast(d.error || 'Delete failed.', true); return; }
      showToast('File deleted.', false);
      await loadFiles();
    } catch(e) {
      showToast('Network error.', true);
    }
  });

  // ── Upload ────────────────────────────────────────────────────────────────
  async function uploadFiles(fileList) {
    for (const file of fileList) {
      showToast(`Uploading ${file.name}…`, false);
      const fd = new FormData();
      fd.append('file', file);
      try {
        const res = await fetch('/api/upload', {
          method: 'POST',
          headers: { [csrfHeader]: csrfToken },
          body: fd
        });
        const data = await res.json();
        if (!res.ok) { showToast(data.error || 'Upload failed.', true); continue; }
        showToast('Uploaded!', false);
      } catch(e) {
        showToast('Network error.', true);
      }
    }
    await loadFiles();
  }

  document.getElementById('uploadInput').addEventListener('change', function() {
    if (this.files.length) uploadFiles(Array.from(this.files));
    this.value = '';
  });

  // ── Drag-and-drop on whole page ───────────────────────────────────────────
  const overlay = document.getElementById('dropOverlay');
  let dragCounter = 0;
  document.addEventListener('dragenter', e => { e.preventDefault(); dragCounter++; overlay.style.display = 'flex'; });
  document.addEventListener('dragleave', e => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { dragCounter = 0; overlay.style.display = 'none'; }});
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault(); dragCounter = 0; overlay.style.display = 'none';
    if (e.dataTransfer.files.length) uploadFiles(Array.from(e.dataTransfer.files));
  });

  // ── Helpers ───────────────────────────────────────────────────────────────
  function showToast(msg, isError) {
    const t = document.getElementById('uploadToast');
    t.textContent = msg;
    t.className = 'upload-toast ' + (isError ? 'upload-toast-error' : 'upload-toast-success');
    t.style.display = 'block';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.style.display = 'none'; }, 4000);
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadFiles();
</script>
</body>
</html>
