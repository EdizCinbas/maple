<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${post.title} + ' · Edy\'s Dev Corner'">Post</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar site-navbar px-3">
  <a class="navbar-brand" th:href="@{/}">Edy's Dev Corner</a>
  <div class="d-flex align-items-center gap-2">
    <a th:href="@{/posts/new}" class="btn btn-accent btn-sm" sec:authorize="hasRole('ROLE_ADMIN')">+ New Post</a>
    <a th:href="@{/media}" class="nav-link" style="font-size:0.875rem;" sec:authorize="hasRole('ROLE_ADMIN')">Media</a>
    <a th:href="@{/login}" class="nav-link" sec:authorize="!isAuthenticated()">Login</a>
    <form th:action="@{/logout}" method="POST" sec:authorize="isAuthenticated()" class="m-0">
      <button type="submit" class="btn btn-outline-secondary btn-sm" style="color:#cbd5e1;border-color:#334155;">Logout</button>
    </form>
  </div>
</nav>

<main class="container py-5" style="max-width: 760px;">
  <a th:href="@{/}" class="text-decoration-none text-muted small">← Back to posts</a>

  <article class="mt-3">
    <div class="post-header mt-3">
      <h1 th:text="${post.title}">Title</h1>
      <p class="text-muted small">
        By <strong th:text="${post.account.firstName}"></strong>
        &middot; <span th:text="${#temporals.format(post.createdAt, 'HH:mm, d MMM yyyy')}"></span>
      </p>
    </div>
    <div class="post-body" th:utext="${renderedBody}"></div>
  </article>

  <div class="d-flex gap-2 mt-4" sec:authorize="hasRole('ROLE_ADMIN')">
    <a th:href="@{'/posts/' + ${post.id} + '/edit'}" class="btn btn-outline-primary btn-sm">Edit</a>
    <button type="button" class="btn btn-outline-danger btn-sm"
            data-bs-toggle="modal" data-bs-target="#deleteModal">Delete</button>
  </div>

  <!-- Delete confirm modal -->
  <div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header border-0">
          <h5 class="modal-title fw-bold">Delete post?</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-muted">
          "<span th:text="${post.title}"></span>" will be permanently deleted.
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
          <a th:href="@{'/posts/' + ${post.id} + '/delete'}" class="btn btn-danger btn-sm">Delete</a>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <p class="m-0">&copy; 2025 Edy's Dev Corner. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
</html>
