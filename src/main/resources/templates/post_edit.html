<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit Post · Edy's Dev Corner</title>
  <meta name="_csrf" th:content="${_csrf.token}">
  <meta name="_csrf_header" th:content="${_csrf.headerName}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
</head>
<body>

<nav class="navbar site-navbar px-3">
  <a class="navbar-brand" th:href="@{/}">Edy's Dev Corner</a>
</nav>

<main class="container py-5">
  <div class="editor-card">
    <h2 class="mb-4">Edit Post</h2>
    <form th:action="@{'/posts/{id}'(id=${post.id})}" th:object="${post}" method="POST">
      <input type="hidden" th:field="*{account}" />
      <input type="hidden" th:field="*{createdAt}" />
      <div class="mb-3">
        <label for="title" class="form-label fw-semibold">Title</label>
        <input id="title" type="text" th:field="*{title}" class="form-control" required>
      </div>
      <div class="mb-4">
        <label for="body" class="form-label fw-semibold">Body</label>
        <textarea id="body" th:field="*{body}" class="form-control" rows="10"></textarea>
      </div>
      <!-- hidden file input for upload button -->
      <input type="file" id="mediaFileInput" accept="image/*,video/*" style="display:none">
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a th:href="@{'/posts/' + ${post.id}}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
    <!-- upload feedback toast -->
    <div id="uploadToast" class="upload-toast" style="display:none"></div>
  </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
<script>
  const csrfToken  = document.querySelector('meta[name="_csrf"]').content;
  const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;

  function showUploadToast(msg, isError) {
    const toast = document.getElementById('uploadToast');
    toast.textContent = msg;
    toast.className = 'upload-toast ' + (isError ? 'upload-toast-error' : 'upload-toast-success');
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 4000);
  }

  async function uploadFile(file, onSuccess, onError) {
    const allowed = ['image/jpeg','image/png','image/gif','image/webp','video/mp4','video/webm'];
    if (!allowed.includes(file.type)) {
      onError('Unsupported file type. Use JPEG, PNG, GIF, WebP, MP4, or WebM.');
      return;
    }
    showUploadToast('Uploading…', false);
    const fd = new FormData();
    fd.append('file', file);
    try {
      const res = await fetch('/api/upload', {
        method: 'POST',
        headers: { [csrfHeader]: csrfToken },
        body: fd
      });
      const data = await res.json();
      if (!res.ok) { onError(data.error || 'Upload failed.'); return; }
      onSuccess(data.url, file.type);
    } catch(e) {
      onError('Network error during upload.');
    }
  }

  function insertMedia(editor, url, mimeType) {
    const cm = editor.codemirror;
    const isVideo = mimeType && mimeType.startsWith('video/');
    const syntax = isVideo
      ? `<video src="${url}" controls style="max-width:100%"></video>`
      : `![image](${url})`;
    cm.replaceSelection(syntax);
    showUploadToast('Uploaded successfully!', false);
  }

  const easyMDE = new EasyMDE({
    element: document.getElementById('body'),
    spellChecker: false,
    toolbar: [
      "bold","italic","heading","|",
      "quote","unordered-list","ordered-list","|",
      "link","image","|",
      {
        name: "upload-media",
        action: function(editor) {
          const input = document.getElementById('mediaFileInput');
          input.value = '';
          input.onchange = function() {
            if (!input.files.length) return;
            uploadFile(input.files[0],
              (url, type) => insertMedia(editor, url, type),
              (err) => showUploadToast(err, true)
            );
          };
          input.click();
        },
        className: "fa fa-upload",
        title: "Upload Image or Video",
      },
      "|","preview","side-by-side","fullscreen"
    ],
    uploadImage: true,
    imageUploadFunction: function(file, onSuccess, onError) {
      uploadFile(file,
        (url, type) => {
          if (type && type.startsWith('video/')) {
            easyMDE.codemirror.replaceSelection(`<video src="${url}" controls style="max-width:100%"></video>`);
            showUploadToast('Uploaded successfully!', false);
            onSuccess(url);
          } else {
            onSuccess(url);
            showUploadToast('Uploaded successfully!', false);
          }
        },
        (err) => {
          onError(err);
          showUploadToast(err, true);
        }
      );
    },
  });
</script>
</body>
</html>
