<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog :: Update Post</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
  <a th:href="@{/}" class="button-link">Home</a>
  <form action="#"
        th:action="@{'/posts/{id}'(id=${post.id})}"
        th:object="${post}"
        method="POST">
    <input type="hidden" th:field="*{account}" />
    <input type="hidden" th:field="*{createdAt}" />
    <h2>Update Post</h2>
    <div>
    </div>
    <div>
      <label for="new-post-body">Body</label>
      <textarea id="new-post-body" th:field="*{body}"></textarea>
    </div>
    <button type="submit">Update Post</button>
  </form>
</div>
</body>
</html>
