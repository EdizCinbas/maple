<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit Post · Edy's Dev Corner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar site-navbar px-3">
  <a class="navbar-brand" th:href="@{/}">Edy's Dev Corner</a>
</nav>

<main class="container">
  <div class="form-card">
    <h2>Edit Post</h2>
    <form th:action="@{'/posts/{id}'(id=${post.id})}" th:object="${post}" method="POST">
      <input type="hidden" th:field="*{account}" />
      <input type="hidden" th:field="*{createdAt}" />
      <div class="mb-3">
        <label for="title" class="form-label fw-semibold">Title</label>
        <input id="title" type="text" th:field="*{title}" class="form-control" required>
      </div>
      <div class="mb-4">
        <label for="body" class="form-label fw-semibold">Body</label>
        <textarea id="body" th:field="*{body}" class="form-control" rows="10"></textarea>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a th:href="@{'/posts/' + ${post.id}}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</main>

<footer class="site-footer">
  <p class="m-0">&copy; 2025 Edy's Dev Corner. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
